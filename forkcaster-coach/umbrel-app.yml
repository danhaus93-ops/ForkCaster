icon: https://raw.githubusercontent.com/danhaus93-ops/ForkCaster/main/dist/icon.svg
gallery: []
releaseNotes: >-
  v0.2.88: follows nutrition PDF references all the way home - links wrapped in
  Google Docs viewers get unwrapped (Raising Cane's), relative PDF paths announced
  in site data feeds get resolved (Chipotle's official Nutrition Facts), English
  editions are preferred over Spanish, and nothing that isn't a real PDF ever
  reaches the reader again.
