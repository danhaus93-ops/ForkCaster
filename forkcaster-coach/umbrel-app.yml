gallery: []
releaseNotes: >-
  v0.2.95: fixes the "Ranking hiccup (temperature is deprecated)" error - the
  app no longer sends a retired AI setting that newer models reject, so venue
  ranking works reliably again. Error messages now say exactly what went wrong
  instead of guessing.
