gallery: []
releaseNotes: >-
  v0.2.51 GOAL BODY SIMULATOR: take a progress photo and generate a
  photorealistic preview of yourself at your goal weight (Gemini Nano Banana
  2 image editing - same person, same clothing, only body composition
  changes, computed from your real current/goal numbers). Results land in the
  Before/After strip with an AI GOAL PREVIEW badge. Requires a Google AI
  (Gemini) key in Settings; roughly 7 cents per render. Visualization, not a
  prediction.
