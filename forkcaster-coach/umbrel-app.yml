releaseNotes: >-
  v0.2.52: the goal simulator moves to its own sheet - tap Goal body
  simulator to open a dedicated Now vs At-goal view with a source photo
  picker, per-photo simulation history, re-simulate, delete, and a Now-vs-
  Goal share image. Real Before/After progress photos stay completely
  untouched; any earlier simulations are migrated out of the real strip
  automatically.
