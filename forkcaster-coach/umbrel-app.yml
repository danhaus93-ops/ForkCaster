releaseNotes: >-
  v0.1.15: navigation-style location - continuous GPS following with smooth
  auto-recenter, a locate button to snap back after browsing the map, live
  vs pinned distinction in the header, and venue re-query only after moving
  150+ meters so Places API usage stays tiny.
