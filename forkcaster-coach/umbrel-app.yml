releaseNotes: >-
  v0.2.68: the nutrition-PDF harvester now searches every iframe on the page
  AND regex-scans the full rendered HTML for PDF URLs (catching links
  embedded in script data with no visible anchor). Render diagnostics log
  text size, frame count, and PDFs found per page.
