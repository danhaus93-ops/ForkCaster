manifestVersion: 1
id: forkcaster-coach
name: ForkCaster
tagline: Medication-aware nutrition coach — what to order, right now
category: ai
version: "0.2.68"
port: 3450
description: >-
  ForkCaster is a self-hosted, GPS-aware nutrition coach. It ranks what to
  order at restaurants near you against your remaining macros for the day,
  adjusts recommendations to your GLP-1 medication, dose week, and logged
  nausea, correlates side effects with meals, filters allergens out of every
  suggestion, and tracks weight, body composition, and progress photos — all
  on your own hardware. Requires an Anthropic API key for AI features; a
  Google Places key is optional for live nearby restaurants.
