releaseNotes: >-
  v0.2.27: supersedes v0.2.26 (which shipped without its intended fixes).
  Ranking reliability for real this time: bigger AI token budget, truncated
  JSON salvaged instead of erroring, tap-to-retry bypasses the cooldown,
  anchored rubric bands stabilize scores, honest error copy. Ordering returns
  exactly 3 picks with at least 2 from a goal-aligned menu section when one
  exists.
