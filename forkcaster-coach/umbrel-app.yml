icon: https://raw.githubusercontent.com/danhaus93-ops/ForkCaster/main/dist/icon.svg
gallery: []
releaseNotes: >-
  v0.1.6: fully interactive map (drag, pinch-zoom, inertia via Leaflet) with a
  Search-this-area button, real venue coordinates from Places, HD retina tiles;
  your location now persists across app opens; header and nav respect the
  iPhone notch so the settings gear is reachable again.
