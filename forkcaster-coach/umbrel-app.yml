releaseNotes: >-
  v0.2.58 pill-mode polish: titration note reads naturally (Take on an empty
  stomach...), the dose calendar shows a capsule icon instead of a syringe
  for daily pills (day markers, legend, and due banner), and the Ramp-up
  journey copy reads properly.
