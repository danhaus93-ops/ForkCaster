gallery: []
releaseNotes: >-
  v0.1.7: nearby search now returns up to 20 venues ranked by distance across
  restaurants, fast food, cafes, takeaway, sandwich shops and bakeries within
  3 km; venue cards show real distances in miles; up to 12 pins on the map.
