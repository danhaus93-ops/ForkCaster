manifestVersion: 1
id: forkcaster-coach
name: ForkCaster
tagline: Medication-aware nutrition coach — what to order, right now
category: ai
version: "0.2.91"
port: 3450
description: >-
  ForkCaster is a self-hosted, GPS-aware nutrition coach. It ranks what to
  order at restaurants near you against your remaining macros for the day,
  adjusts recommendations to your GLP-1 medication, dose week, and logged
  nausea, correlates side effects with meals, filters allergens out of every
  suggestion, and tracks weight, body composition, and progress photos — all
  on your own hardware. Requires an Anthropic API key for AI features; a
  Google Places key is optional for live nearby restaurants.
developer: ForkCaster
website: https://github.com/danhaus93-ops/ForkCaster
repo: https://github.com/danhaus93-ops/ForkCaster
support: https://github.com/danhaus93-ops/ForkCaster/issues
icon: https://raw.githubusercontent.com/danhaus93-ops/ForkCaster/main/dist/icon.svg
gallery: []
releaseNotes: >-
  v0.2.91: universal menu reader - when a restaurant site's nutrition data
  arrives in a format ForkCaster has never seen before, the raw data now goes
  straight to the AI to read instead of falling back to estimates. Any data
  shape, current or future, gets real calories, protein, and fat. Official
  PDFs and known formats still take priority.
dependencies: []
