icon: https://raw.githubusercontent.com/danhaus93-ops/ForkCaster/main/dist/icon.svg
gallery: []
releaseNotes: >-
  v0.2.11: direct access port 3451 bypasses the Umbrel auth proxy for the
  Tailscale/PWA path, so a rotated dashboard session can never silently break
  API calls again. Network error copy now says what actually happened.
