releaseNotes: >-
  v0.2.34: cheaper models get a fair fight - the JSON salvage parser now
  extracts a balanced JSON object even when models wrap it in prose, menu
  text is right-sized per model (Haiku gets a smaller digest than Fable),
  and the output contract is stated unmistakably. Includes v0.2.33's
  scraper fixes for the GLP-1 goal.
