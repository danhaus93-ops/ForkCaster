version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: forkcaster_web_1
      APP_PORT: 3450

  web:
    # pin the digest here:
    image: 127.0.0.1:5000/forkcaster:v0.2.78
    restart: on-failure
    stop_grace_period: 30s
    ports:
      - "3451:3450"
    environment:
      - DATA_DIR=/data
    volumes:
      - ${APP_DATA_DIR}/data:/data
